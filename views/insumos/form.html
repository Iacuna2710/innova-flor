<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nuevo Insumo – Innova Flor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>body { background-color: #f8fdf9; } nav.navbar { background-color: #1b4332; }</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">🌿 Innova Flor</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/plantas">🌱 Plantas</a></li>
        <li class="nav-item"><a class="nav-link" href="/maceteros">🪴 Maceteros</a></li>
        <li class="nav-item"><a class="nav-link active" href="/insumos">🧪 Insumos</a></li>
        <li class="nav-item"><a class="nav-link" href="/clientes">👤 Clientes</a></li>
        <li class="nav-item"><a class="nav-link" href="/proveedores">🏭 Proveedores</a></li>
        <li class="nav-item"><a class="nav-link" href="/ventas">💰 Ventas</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container mt-4" style="max-width:600px">
  <nav aria-label="breadcrumb"><ol class="breadcrumb"><li class="breadcrumb-item"><a href="/insumos">Insumos</a></li><li class="breadcrumb-item active">Nuevo</li></ol></nav>
  <div class="card shadow-sm">
    <div class="card-header bg-success text-white fw-bold">🧪 Nuevo Insumo</div>
    <div class="card-body">
      <div id="alerta" class="d-none"></div>
      <div class="mb-3"><label class="form-label">ID</label><input type="text" id="id" class="form-control" readonly/></div>
      <div class="mb-3"><label class="form-label">Nombre</label><input type="text" id="nombre" class="form-control"/></div>
      <div class="mb-3">
        <label class="form-label">Categoría</label>
        <select id="categoria" class="form-select">
          <option value="sustrato">Sustrato</option>
          <option value="fertilizante">Fertilizante</option>
          <option value="accesorio">Accesorio</option>
          <option value="herramienta">Herramienta</option>
        </select>
      </div>
      <div class="mb-3"><label class="form-label">Marca</label><input type="text" id="marca" class="form-control"/></div>
      <div class="mb-3"><label class="form-label">Presentación</label><input type="text" id="presentacion" class="form-control" placeholder="5 kg, 500 ml, 1 unidad..."/></div>
      <div class="mb-3">
        <label class="form-label">Proveedor</label>
        <select id="proveedor_id" class="form-select">
         <option value="">Cargando proveedores...</option>
        </select>
      </div>
    <div class="row">
        <div class="col mb-3"><label class="form-label">Precio (₡)</label><input type="number" id="precio" class="form-control" min="0"/></div>
        <div class="col mb-3"><label class="form-label">Stock</label><input type="number" id="stock" class="form-control" min="0"/></div>
      </div>
      <div class="mb-3 form-check"><input type="checkbox" id="disponible" class="form-check-input" checked/><label class="form-check-label" for="disponible">Disponible</label></div>
      <div class="d-flex gap-2">
        <button class="btn btn-success" onclick="guardar()">Guardar</button>
        <a href="/insumos" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  async function generarId() {
  const res = await fetch("/insumos/api");
  const data = await res.json();
  document.getElementById("id").value = "INS-" + String(data.length + 1).padStart(3, "0");
}
generarId();
async function cargarProveedores() {
  const res = await fetch("/proveedores/api");
  const proveedores = await res.json();
  const select = document.getElementById("proveedor_id");
  select.innerHTML = proveedores
    .filter(p => p.activo)
    .map(p => `<option value="${p._id}">${p.nombre} (${p._id})</option>`)
    .join("");
}
cargarProveedores();
  async function guardar() {
    const body = {
      _id: document.getElementById("id").value.trim(),
      nombre: document.getElementById("nombre").value.trim(),
      categoria: document.getElementById("categoria").value,
      marca: document.getElementById("marca").value.trim(),
      presentacion: document.getElementById("presentacion").value.trim(),
      proveedor_id: document.getElementById("proveedor_id").value.trim(),
      precio: Number(document.getElementById("precio").value),
      stock: Number(document.getElementById("stock").value),
      disponible: document.getElementById("disponible").checked
    };
    const res = await fetch("/insumos/api", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
    const alerta = document.getElementById("alerta");
    if (res.ok) { alerta.className = "alert alert-success"; alerta.textContent = "Insumo creado."; alerta.classList.remove("d-none"); setTimeout(() => window.location.href = "/insumos", 1200); }
    else { alerta.className = "alert alert-danger"; alerta.textContent = "Error al guardar."; alerta.classList.remove("d-none"); }
  }
</script>
</body>
</html>
