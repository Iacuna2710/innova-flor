<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ventas – Innova Flor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>body { background-color: #f8fdf9; } nav.navbar { background-color: #1b4332; }</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">🌿 Innova Flor</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/plantas">🌱 Plantas</a></li>
        <li class="nav-item"><a class="nav-link" href="/maceteros">🪴 Maceteros</a></li>
        <li class="nav-item"><a class="nav-link" href="/insumos">🧪 Insumos</a></li>
        <li class="nav-item"><a class="nav-link" href="/clientes">👤 Clientes</a></li>
        <li class="nav-item"><a class="nav-link" href="/proveedores">🏭 Proveedores</a></li>
        <li class="nav-item"><a class="nav-link active" href="/ventas">💰 Ventas</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="fw-bold">💰 Ventas</h2>
    <a href="/ventas/nueva" class="btn btn-success">+ Nueva venta</a>
  </div>
  <div class="card shadow-sm">
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-success">
          <tr><th>Factura</th><th>Fecha</th><th>Cliente</th><th>Producto</th><th>Cant.</th><th>Total (₡)</th><th>Pago</th><th>Estado</th><th>Acciones</th></tr>
        </thead>
        <tbody id="bodyVentas"><tr><td colspan="9" class="text-center py-4 text-muted">Cargando...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal fade" id="modalAnular" tabindex="-1">
  <div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Confirmar anulación</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">¿Deseas anular esta venta? No se eliminará de la base de datos.</div>
    <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-danger" id="btnConfirmarAnular">Anular</button></div>
  </div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let idAAnular = null;
  const modal = new bootstrap.Modal(document.getElementById("modalAnular"));
  const estadoBadge = { completada: 'bg-success', pendiente: 'bg-warning text-dark', anulada: 'bg-danger' };

  async function cargar() {
    const res = await fetch("/ventas/api");
    const data = await res.json();
    const tbody = document.getElementById("bodyVentas");
    if (!data.length) { tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted">Sin registros</td></tr>'; return; }
    tbody.innerHTML = data.map(v => {
      const fecha = new Date(v.fecha).toLocaleDateString("es-CR");
      return `
      <tr>
        <td><small class="fw-bold">${v.numero_factura}</small></td>
        <td>${fecha}</td>
        <td><small>${v.cliente_id}</small></td>
        <td>${v.nombre_producto}</td>
        <td>${v.cantidad}</td>
        <td>₡${v.total.toLocaleString()}</td>
        <td><span class="badge bg-secondary">${v.metodo_pago}</span></td>
        <td><span class="badge ${estadoBadge[v.estado] || 'bg-secondary'}">${v.estado}</span></td>
        <td>
          <a href="/ventas/editar/${v._id}" class="btn btn-sm btn-outline-primary me-1">Editar</a>
          <button class="btn btn-sm btn-outline-danger" onclick="confirmar('${v._id}')" ${v.estado === 'anulada' ? 'disabled' : ''}>Anular</button>
        </td>
      </tr>`;
    }).join("");
  }

  function confirmar(id) { idAAnular = id; modal.show(); }
  document.getElementById("btnConfirmarAnular").addEventListener("click", async () => {
    await fetch(`/ventas/api/${idAAnular}`, { method: "DELETE" });
    modal.hide(); cargar();
  });
  cargar();
</script>
</body>
</html>
