<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Editar Venta – Innova Flor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>body { background-color: #f8fdf9; } nav.navbar { background-color: #1b4332; }</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">🌿 Innova Flor</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/plantas">🌱 Plantas</a></li>
        <li class="nav-item"><a class="nav-link" href="/maceteros">🪴 Maceteros</a></li>
        <li class="nav-item"><a class="nav-link" href="/insumos">🧪 Insumos</a></li>
        <li class="nav-item"><a class="nav-link" href="/clientes">👤 Clientes</a></li>
        <li class="nav-item"><a class="nav-link" href="/proveedores">🏭 Proveedores</a></li>
        <li class="nav-item"><a class="nav-link active" href="/ventas">💰 Ventas</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4" style="max-width:650px">
  <nav aria-label="breadcrumb">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="/ventas">Ventas</a></li>
      <li class="breadcrumb-item active">Editar venta</li>
    </ol>
  </nav>

  <div class="card shadow-sm">
    <div class="card-header bg-primary text-white fw-bold">✏️ Editar Venta</div>
    <div class="card-body">
      <div id="alerta" class="d-none"></div>

      <div class="row">
        <div class="col mb-3">
          <label class="form-label">ID</label>
          <input type="text" id="id" class="form-control" readonly/>
        </div>
        <div class="col mb-3">
          <label class="form-label">Número de factura</label>
          <input type="text" id="numero_factura" class="form-control" readonly/>
        </div>
      </div>

      <div class="row">
        <div class="col mb-3">
          <label class="form-label">Fecha</label>
          <input type="date" id="fecha" class="form-control"/>
        </div>
        <div class="col mb-3">
          <label class="form-label">Empleado</label>
          <input type="text" id="empleado" class="form-control"/>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Cliente</label>
        <select id="cliente_id" class="form-select">
          <option value="">Cargando clientes...</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Tipo de producto</label>
        <select id="tipo_producto" class="form-select" onchange="cargarProductos()">
          <option value="planta">Planta</option>
          <option value="macetero">Macetero</option>
          <option value="insumo">Insumo</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Producto</label>
        <select id="producto_select" class="form-select" onchange="seleccionarProducto()">
          <option value="">Seleccione un producto...</option>
        </select>
      </div>

      <input type="hidden" id="producto_id"/>
      <input type="hidden" id="nombre_producto"/>

      <div class="row">
        <div class="col mb-3">
          <label class="form-label">Cantidad</label>
          <input type="number" id="cantidad" class="form-control" min="1" oninput="calcularTotal()"/>
        </div>
        <div class="col mb-3">
          <label class="form-label">Precio unitario (₡)</label>
          <input type="number" id="precio_unitario" class="form-control" readonly/>
        </div>
        <div class="col mb-3">
          <label class="form-label">Total (₡)</label>
          <input type="number" id="total" class="form-control" readonly/>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Método de pago</label>
        <select id="metodo_pago" class="form-select">
          <option value="efectivo">Efectivo</option>
          <option value="tarjeta">Tarjeta</option>
          <option value="transferencia">Transferencia</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Estado</label>
        <select id="estado" class="form-select">
          <option value="completada">Completada</option>
          <option value="pendiente">Pendiente</option>
          <option value="anulada">Anulada</option>
        </select>
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-primary" onclick="actualizar()">Actualizar</button>
        <a href="/ventas" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const id = window.location.pathname.split("/").pop();

  async function cargarClientes(clienteActual) {
    const res = await fetch("/clientes/api");
    const clientes = await res.json();
    const select = document.getElementById("cliente_id");
    select.innerHTML = clientes
      .filter(c => c.activo !== false)
      .map(c => `<option value="${c._id}" ${c._id === clienteActual ? "selected" : ""}>${c.nombre} (${c._id})</option>`)
      .join("");
  }

  async function cargarProductos(productoActual = null) {
    const tipo = document.getElementById("tipo_producto").value;
    const rutas = { planta: "/plantas/api", macetero: "/maceteros/api", insumo: "/insumos/api" };
    const res = await fetch(rutas[tipo]);
    const productos = await res.json();

    const select = document.getElementById("producto_select");
    select.innerHTML = '<option value="">Seleccione un producto...</option>' +
      productos.map(p => {
        const nombre = p.nombre_comun || p.nombre || `${p.material} ${p.color}`;
        const seleccionado = productoActual && p._id === productoActual ? "selected" : "";
        return `<option value="${p._id}" data-nombre="${nombre}" data-precio="${p.precio}" ${seleccionado}>${nombre} — ₡${p.precio.toLocaleString()}</option>`;
      }).join("");

    // Si hay un producto preseleccionado, llenar precio
    if (productoActual) {
      const opcionSeleccionada = select.querySelector(`option[value="${productoActual}"]`);
      if (opcionSeleccionada) {
        document.getElementById("producto_id").value = productoActual;
        document.getElementById("nombre_producto").value = opcionSeleccionada.getAttribute("data-nombre");
        document.getElementById("precio_unitario").value = parseFloat(opcionSeleccionada.getAttribute("data-precio")) || 0;
        calcularTotal();
      }
    }
  }

  function seleccionarProducto() {
    const select = document.getElementById("producto_select");
    const opcion = select.options[select.selectedIndex];
    if (!opcion || !opcion.value) return;

    const precio = parseFloat(opcion.getAttribute("data-precio")) || 0;
    const nombre = opcion.getAttribute("data-nombre") || "";

    document.getElementById("producto_id").value = opcion.value;
    document.getElementById("nombre_producto").value = nombre;
    document.getElementById("precio_unitario").value = precio;
    calcularTotal();
  }

  function calcularTotal() {
    const cant = parseFloat(document.getElementById("cantidad").value) || 0;
    const precio = parseFloat(document.getElementById("precio_unitario").value) || 0;
    document.getElementById("total").value = (cant * precio).toFixed(0);
  }

  async function cargar() {
    const res = await fetch(`/ventas/api/${id}`);
    if (!res.ok) { alert("Venta no encontrada"); return; }
    const v = await res.json();

    document.getElementById("id").value = v._id;
    document.getElementById("numero_factura").value = v.numero_factura;
    document.getElementById("fecha").value = new Date(v.fecha).toISOString().split("T")[0];
    document.getElementById("empleado").value = v.empleado;
    document.getElementById("tipo_producto").value = v.tipo_producto;
    document.getElementById("cantidad").value = v.cantidad;
    document.getElementById("precio_unitario").value = v.precio_unitario;
    document.getElementById("total").value = v.total;
    document.getElementById("metodo_pago").value = v.metodo_pago;
    document.getElementById("estado").value = v.estado;

    // Cargar clientes y preseleccionar el actual
    await cargarClientes(v.cliente_id);

    // Cargar productos del tipo correcto y preseleccionar el actual
    await cargarProductos(v.producto_id);

    document.getElementById("producto_id").value = v.producto_id;
    document.getElementById("nombre_producto").value = v.nombre_producto;
  }

  async function actualizar() {
    const productoId = document.getElementById("producto_id").value;
    if (!productoId) {
      const alerta = document.getElementById("alerta");
      alerta.className = "alert alert-warning";
      alerta.textContent = "Debes seleccionar un producto.";
      alerta.classList.remove("d-none");
      return;
    }

    const body = {
      numero_factura: document.getElementById("numero_factura").value.trim(),
      fecha: new Date(document.getElementById("fecha").value).toISOString(),
      empleado: document.getElementById("empleado").value.trim(),
      cliente_id: document.getElementById("cliente_id").value,
      tipo_producto: document.getElementById("tipo_producto").value,
      producto_id: productoId,
      nombre_producto: document.getElementById("nombre_producto").value,
      cantidad: Number(document.getElementById("cantidad").value),
      precio_unitario: Number(document.getElementById("precio_unitario").value),
      total: Number(document.getElementById("total").value),
      metodo_pago: document.getElementById("metodo_pago").value,
      estado: document.getElementById("estado").value
    };

    const res = await fetch(`/ventas/api/${id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });

    const alerta = document.getElementById("alerta");
    if (res.ok) {
      alerta.className = "alert alert-success";
      alerta.textContent = "Venta actualizada exitosamente.";
      alerta.classList.remove("d-none");
      setTimeout(() => window.location.href = "/ventas", 1200);
    } else {
      alerta.className = "alert alert-danger";
      alerta.textContent = "Error al actualizar.";
      alerta.classList.remove("d-none");
    }
  }

  cargar();
</script>
</body>
</html>
