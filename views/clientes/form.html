<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nuevo Cliente – Innova Flor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>body { background-color: #f8fdf9; } nav.navbar { background-color: #1b4332; }</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">🌿 Innova Flor</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/plantas">🌱 Plantas</a></li>
        <li class="nav-item"><a class="nav-link" href="/maceteros">🪴 Maceteros</a></li>
        <li class="nav-item"><a class="nav-link" href="/insumos">🧪 Insumos</a></li>
        <li class="nav-item"><a class="nav-link active" href="/clientes">👤 Clientes</a></li>
        <li class="nav-item"><a class="nav-link" href="/proveedores">🏭 Proveedores</a></li>
        <li class="nav-item"><a class="nav-link" href="/ventas">💰 Ventas</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container mt-4" style="max-width:600px">
  <nav aria-label="breadcrumb"><ol class="breadcrumb"><li class="breadcrumb-item"><a href="/clientes">Clientes</a></li><li class="breadcrumb-item active">Nuevo</li></ol></nav>
  <div class="card shadow-sm">
    <div class="card-header bg-success text-white fw-bold">👤 Nuevo Cliente</div>
    <div class="card-body">
      <div id="alerta" class="d-none"></div>
      <div class="mb-3"><label class="form-label">ID</label><input type="text" id="id" class="form-control" readonly/></div>
      <div class="mb-3"><label class="form-label">Nombre completo</label><input type="text" id="nombre" class="form-control"/></div>
      <div class="mb-3"><label class="form-label">Cédula</label><input type="text" id="cedula" class="form-control" placeholder="1-1234-5678"/></div>
      <div class="mb-3"><label class="form-label">Email</label><input type="email" id="email" class="form-control"/></div>
      <div class="mb-3"><label class="form-label">Teléfono</label><input type="text" id="telefono" class="form-control" placeholder="2234-9999"/></div>
      <div class="mb-3"><label class="form-label">Dirección</label><input type="text" id="direccion" class="form-control"/></div>
      <div class="mb-3">
        <label class="form-label">Tipo de cliente</label>
        <select id="tipo_cliente" class="form-select">
          <option value="nuevo">Nuevo</option>
          <option value="frecuente">Frecuente</option>
          <option value="mayorista">Mayorista</option>
        </select>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-success" onclick="guardar()">Guardar</button>
        <a href="/clientes" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  async function generarId() {
  const res = await fetch("/clientes/api");
  const data = await res.json();
  document.getElementById("id").value = "CLI-" + String(data.length + 1).padStart(3, "0");
}
generarId();
  async function guardar() {
    const body = {
      _id: document.getElementById("id").value.trim(),
      nombre: document.getElementById("nombre").value.trim(),
      cedula: document.getElementById("cedula").value.trim(),
      email: document.getElementById("email").value.trim(),
      telefono: document.getElementById("telefono").value.trim(),
      direccion: document.getElementById("direccion").value.trim(),
      fecha_registro: new Date().toISOString(),
      tipo_cliente: document.getElementById("tipo_cliente").value,
      activo: true
    };
    const res = await fetch("/clientes/api", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
    const alerta = document.getElementById("alerta");
    if (res.ok) { alerta.className = "alert alert-success"; alerta.textContent = "Cliente creado exitosamente."; alerta.classList.remove("d-none"); setTimeout(() => window.location.href = "/clientes", 1200); }
    else { alerta.className = "alert alert-danger"; alerta.textContent = "Error al guardar."; alerta.classList.remove("d-none"); }
  }
</script>
</body>
</html>
