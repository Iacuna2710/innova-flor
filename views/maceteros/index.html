<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maceteros – Innova Flor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>body { background-color: #f8fdf9; } nav.navbar { background-color: #1b4332; }</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">🌿 Innova Flor</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/plantas">🌱 Plantas</a></li>
        <li class="nav-item"><a class="nav-link active" href="/maceteros">🪴 Maceteros</a></li>
        <li class="nav-item"><a class="nav-link" href="/insumos">🧪 Insumos</a></li>
        <li class="nav-item"><a class="nav-link" href="/clientes">👤 Clientes</a></li>
        <li class="nav-item"><a class="nav-link" href="/proveedores">🏭 Proveedores</a></li>
        <li class="nav-item"><a class="nav-link" href="/ventas">💰 Ventas</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="fw-bold">🪴 Maceteros</h2>
    <a href="/maceteros/nuevo" class="btn btn-success">+ Nuevo macetero</a>
  </div>
  <div class="card shadow-sm">
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-success">
          <tr><th>ID</th><th>Material</th><th>Color</th><th>Estilo</th><th>Precio (₡)</th><th>Stock</th><th>Personalizable</th><th>Estado</th><th>Acciones</th></tr>
        </thead>
        <tbody id="bodyMaceteros">
          <tr><td colspan="9" class="text-center py-4 text-muted">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal fade" id="modalEliminar" tabindex="-1">
  <div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Confirmar desactivación</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">¿Deseas desactivar este macetero?</div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
      <button class="btn btn-danger" id="btnConfirmarEliminar">Desactivar</button>
    </div>
  </div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let idAEliminar = null;
  const modal = new bootstrap.Modal(document.getElementById("modalEliminar"));

  async function cargar() {
    const res = await fetch("/maceteros/api");
    const data = await res.json();
    const tbody = document.getElementById("bodyMaceteros");
    if (!data.length) { tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted">Sin registros</td></tr>'; return; }
    tbody.innerHTML = data.map(m => `
      <tr>
        <td><small class="text-muted">${m._id}</small></td>
        <td>${m.material}</td><td>${m.color}</td><td>${m.estilo}</td>
        <td>₡${m.precio.toLocaleString()}</td><td>${m.stock}</td>
        <td>${m.personalizable ? '✅' : '❌'}</td>
        <td><span class="badge ${m.disponible ? 'bg-success' : 'bg-secondary'}">${m.disponible ? 'Disponible' : 'No disponible'}</span></td>
        <td>
          <a href="/maceteros/editar/${m._id}" class="btn btn-sm btn-outline-primary me-1">Editar</a>
          <button class="btn btn-sm btn-outline-danger" onclick="confirmar('${m._id}')">Desactivar</button>
        </td>
      </tr>`).join("");
  }

  function confirmar(id) { idAEliminar = id; modal.show(); }

  document.getElementById("btnConfirmarEliminar").addEventListener("click", async () => {
    await fetch(`/maceteros/api/${idAEliminar}`, { method: "DELETE" });
    modal.hide(); cargar();
  });

  cargar();
</script>
</body>
</html>
