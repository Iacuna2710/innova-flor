<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Editar Proveedor – Innova Flor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>body { background-color: #f8fdf9; } nav.navbar { background-color: #1b4332; }</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">🌿 Innova Flor</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/plantas">🌱 Plantas</a></li>
        <li class="nav-item"><a class="nav-link" href="/maceteros">🪴 Maceteros</a></li>
        <li class="nav-item"><a class="nav-link" href="/insumos">🧪 Insumos</a></li>
        <li class="nav-item"><a class="nav-link" href="/clientes">👤 Clientes</a></li>
        <li class="nav-item"><a class="nav-link active" href="/proveedores">🏭 Proveedores</a></li>
        <li class="nav-item"><a class="nav-link" href="/ventas">💰 Ventas</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container mt-4" style="max-width:600px">
  <nav aria-label="breadcrumb"><ol class="breadcrumb"><li class="breadcrumb-item"><a href="/proveedores">Proveedores</a></li><li class="breadcrumb-item active">Editar</li></ol></nav>
  <div class="card shadow-sm">
    <div class="card-header bg-primary text-white fw-bold">✏️ Editar Proveedor</div>
    <div class="card-body">
      <div id="alerta" class="d-none"></div>
      <div class="mb-3"><label class="form-label">ID</label><input type="text" id="id" class="form-control" readonly/></div>
      <div class="mb-3"><label class="form-label">Nombre</label><input type="text" id="nombre" class="form-control"/></div>
      <div class="mb-3"><label class="form-label">Teléfono</label><input type="text" id="telefono" class="form-control"/></div>
      <div class="mb-3"><label class="form-label">Email</label><input type="email" id="email" class="form-control"/></div>
      <div class="mb-3"><label class="form-label">Condiciones de pago (días)</label><input type="number" id="condiciones_pago" class="form-control"/></div>
      <div class="mb-3 form-check"><input type="checkbox" id="activo" class="form-check-input"/><label class="form-check-label" for="activo">Activo</label></div>
      <div class="d-flex gap-2">
        <button class="btn btn-primary" onclick="actualizar()">Actualizar</button>
        <a href="/proveedores" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const id = window.location.pathname.split("/").pop();
  async function cargar() {
    const res = await fetch(`/proveedores/api/${id}`);
    const p = await res.json();
    document.getElementById("id").value = p._id;
    document.getElementById("nombre").value = p.nombre;
    document.getElementById("telefono").value = p.telefono;
    document.getElementById("email").value = p.email;
    document.getElementById("condiciones_pago").value = p.condiciones_pago;
    document.getElementById("activo").checked = p.activo;
  }
  async function actualizar() {
    const body = {
      nombre: document.getElementById("nombre").value.trim(),
      telefono: document.getElementById("telefono").value.trim(),
      email: document.getElementById("email").value.trim(),
      condiciones_pago: Number(document.getElementById("condiciones_pago").value),
      activo: document.getElementById("activo").checked
    };
    const res = await fetch(`/proveedores/api/${id}`, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
    const alerta = document.getElementById("alerta");
    if (res.ok) { alerta.className = "alert alert-success"; alerta.textContent = "Proveedor actualizado."; alerta.classList.remove("d-none"); setTimeout(() => window.location.href = "/proveedores", 1200); }
    else { alerta.className = "alert alert-danger"; alerta.textContent = "Error al actualizar."; alerta.classList.remove("d-none"); }
  }
  cargar();
</script>
</body>
</html>
